<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exterminator Test Page</title>
  <script src="../dist/index.global.js" data-endpoint="http://localhost:3002/api/events"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; max-width: 640px; margin: 40px auto; padding: 0 20px; color: #1a1a1a; }
    h1 { font-size: 1.4rem; margin-bottom: 8px; }
    p.sub { color: #666; margin-bottom: 24px; font-size: 0.9rem; }
    .grid { display: grid; gap: 10px; grid-template-columns: 1fr 1fr; }
    button {
      padding: 12px 16px; border: 1px solid #ddd; border-radius: 6px;
      background: #fafafa; cursor: pointer; font-size: 0.85rem; text-align: left;
      transition: background 0.15s;
    }
    button:hover { background: #f0f0f0; }
    button span { display: block; font-weight: 600; margin-bottom: 2px; }
    #log { margin-top: 24px; font-size: 0.8rem; font-family: monospace; white-space: pre-wrap;
           background: #111; color: #0f0; padding: 16px; border-radius: 6px; min-height: 120px; max-height: 400px; overflow-y: auto; }
  </style>
</head>
<body>
  <h1>Exterminator Test Page</h1>
  <p class="sub">Open DevTools Network tab to inspect outgoing POSTs, or run the echo server to see payloads.</p>
  <div class="grid">
    <button onclick="throwError()">
      <span>Throw Error</span>
      uncaught runtime error
    </button>
    <button onclick="throwPromise()">
      <span>Unhandled Rejection</span>
      rejected promise
    </button>
    <button onclick="throwTypeError()">
      <span>TypeError</span>
      call method on undefined
    </button>
    <button onclick="throwReferenceError()">
      <span>ReferenceError</span>
      access undefined variable
    </button>
    <button onclick="throwMany()">
      <span>Throw 15 Errors</span>
      test batch flushing
    </button>
    <button onclick="throwDuplicate()">
      <span>Duplicate Error (x3)</span>
      test dedup fingerprint
    </button>
  </div>
  <div id="log">waiting for errors…
</div>
  <script>
    const log = document.getElementById("log");
    function append(msg) {
      log.textContent += "\n" + new Date().toLocaleTimeString() + "  " + msg;
      log.scrollTop = log.scrollHeight;
    }

    window.addEventListener("error", (e) => append("caught error: " + e.message));
    window.addEventListener("unhandledrejection", (e) => append("caught rejection: " + (e.reason?.message ?? e.reason)));

    function throwError() {
      throw new Error("test error: " + Date.now());
    }

    function throwPromise() {
      Promise.reject(new Error("rejected promise: " + Date.now()));
    }

    function throwTypeError() {
      const obj = undefined;
      obj.someMethod();
    }

    function throwReferenceError() {
      // eslint-disable-next-line no-undef
      thisVariableDoesNotExist;
    }

    function throwMany() {
      for (let i = 0; i < 15; i++) {
        setTimeout(() => { throw new Error("bulk error #" + i); }, i * 50);
      }
    }

    function throwDuplicate() {
      for (let i = 0; i < 3; i++) {
        setTimeout(() => { throw new Error("same error every time"); }, i * 50);
      }
    }
  </script>
</body>
</html>
