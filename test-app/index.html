<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Exterminator Test App</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f5; color: #222; }
    .container { max-width: 600px; margin: 48px auto; padding: 0 24px; }
    h1 { font-size: 1.4rem; margin-bottom: 6px; }
    .subtitle { color: #666; margin-bottom: 28px; font-size: 0.9rem; }
    .user-card {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 14px 18px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .user-name { font-weight: 600; }
    .user-id { color: #999; font-size: 0.8rem; }
    .btn {
      background: #111;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 7px 14px;
      cursor: pointer;
      font-size: 0.85rem;
    }
    .btn:hover { background: #333; }
    .back { display: inline-block; margin-bottom: 20px; color: #111; cursor: pointer; font-size: 0.9rem; }
    .back:hover { text-decoration: underline; }
    .profile-card {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 28px;
      text-align: center;
    }
    .profile-card img { width: 80px; height: 80px; border-radius: 50%; margin-bottom: 14px; }
    .profile-card h2 { margin-bottom: 6px; }
    .profile-card p { color: #555; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="container" id="app"></div>
  <script>
    // User 42 is intentionally missing to trigger the bug
    const USERS = {
      1:  { name: "Alice Chen",  avatar: "https://i.pravatar.cc/80?img=1", bio: "Product designer." },
      2:  { name: "Bob Marsh",   avatar: "https://i.pravatar.cc/80?img=3", bio: "Backend engineer." },
      3:  { name: "Carol Singh", avatar: "https://i.pravatar.cc/80?img=5", bio: "Startup founder."  },
      42: undefined  // BUG: key exists but value is undefined
    };

    const app = document.getElementById("app");

    function renderHome() {
      app.innerHTML = `
        <h1>User Directory</h1>
        <p class="subtitle">Select a user to view their profile.</p>
        ${Object.keys(USERS).map(id => `
          <div class="user-card">
            <div>
              <div class="user-name">User #${id}</div>
              <div class="user-id">id: ${id}</div>
            </div>
            <button class="btn" onclick="navigate('profile', ${id})">View Profile</button>
          </div>
        `).join("")}
      `;
    }

    function renderProfile(userId) {
      const user = USERS[userId];

      // BUG: no null check -- throws TypeError: Cannot read properties of
      // undefined (reading 'avatar') when userId is 42
      app.innerHTML = `
        <span class="back" onclick="navigate('home')">← Back</span>
        <div class="profile-card">
          <img src="${user.avatar}" alt="${user.name}" />
          <h2>${user.name}</h2>
          <p>${user.bio}</p>
        </div>
      `;
    }

    function navigate(page, param) {
      if (page === "home") {
        window.location.hash = "";
        renderHome();
      } else {
        window.location.hash = `profile/${param}`;
        renderProfile(param);
      }
    }

    function route() {
      const hash = window.location.hash.slice(1);
      if (hash.startsWith("profile/")) {
        renderProfile(parseInt(hash.split("/")[1], 10));
      } else {
        renderHome();
      }
    }

    window.addEventListener("hashchange", route);
    route();
  </script>
</body>
</html>
