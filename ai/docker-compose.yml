services:
  agent:
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      sh -c "python3 -m http.server 3000 --directory /code &
             pnpm --dir /app/agent dev"
    ports:
      - "4000:4000"
      - "3000:3000"
    env_file:
      - runner/.env
    volumes:
      - ./agent:/app/agent
      - agent_node_modules:/app/agent/node_modules
      - ./runner:/app/runner

volumes:
  agent_node_modules:
